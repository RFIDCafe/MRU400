name: Build ARM RFID Reader

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install ARM cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

    - name: Create library symlinks
      run: |
        cd src/sdk/lib
        ln -sf libfedm.so.6.10.1 libfedm.so.6
        ln -sf libfedm.so.6 libfedm.so
        ln -sf libfeisp.so.1.4.0 libfeisp.so.1
        ln -sf libfeisp.so.1 libfeisp.so
        ln -sf libfedm-funit.so.1.1.0 libfedm-funit.so.1
        ln -sf libfedm-funit.so.1 libfedm-funit.so
        ls -la

    - name: Build rfid_reader
      run: |
        arm-linux-gnueabihf-g++ \
          -o rfid_reader \
          src/main.cpp \
          -Isrc/sdk/include/fedm \
          -Isrc/sdk/include/fedm-funit \
          -Lsrc/sdk/lib \
          -lfedm \
          -lfeisp \
          -lfedm-funit \
          -Wl,-rpath,/home/app0 \
          -std=c++14 \
          -pthread \
          -Wl,--allow-shlib-undefined

    - name: Build set_brm
      run: |
        arm-linux-gnueabihf-gcc \
          -o set_brm \
          src/set_brm.c \
          -std=c99 \
          -Wall \
          -static-libgcc

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: rfid_reader_arm
        path: |
          rfid_reader
          set_brm
        retention-days: 30
